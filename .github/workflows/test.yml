name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"
          use-public-rspm: true

      - name: Install pak + system deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::testthat, any::dplyr, any::tidyr, any::lme4, any::geepack, any::MatchIt, any::mediation, any::cmprsk, any::bootnet, any::NetworkComparisonTest, any::clubSandwich, any::brant, any::logistf, any::here, any::yaml, any::ggplot2, any::dagitty, any::ggdag, any::lintr, any::styler

      - name: Run unit tests
        run: Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary")'

      - name: Lint R scripts
        run: Rscript -e 'lints <- lintr::lint_dir("R", linters = lintr::linters_with_defaults(line_length_linter = lintr::line_length_linter(120))); cat("Found", length(lints), "lints\n"); quit(status = 0L)'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-test build scripts
        run: |
          python3 scripts/build_callgraph.py
          python3 scripts/build_sankey.py
